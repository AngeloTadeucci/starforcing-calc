<!doctype html>
<html><head><meta charset="utf-8"><meta name="robots" content="noindex"><title>SF tests</title></head>
<body><pre id="out"></pre>
<script src="rates.js"></script>
<script src="simulator.js"></script>
<script src="optimizer.js"></script>
<script src="fodder.js"></script>
<script>
  const log = (...a) => document.getElementById("out").textContent += a.join(" ") + "\n";
  log("baseCost(17, 160):", SF.baseCost(17, 160));
  log("baseCost(0, 160):", SF.baseCost(0, 160));
  log("boomDropStar(22):", SF.boomDropStar(22));   // 17
  log("boomDropStar(20):", SF.boomDropStar(20));   // 15
  log("boomDropStar(15):", SF.boomDropStar(15));   // 12
  log("boomDropStar(26):", SF.boomDropStar(26));   // 20

  // Fodder comparison — expectations cross-checked against the closed-form
  // optimizer math run standalone (level 160 target, level 150 fodder, 22★).
  const check = (name, cond) => log((cond ? "PASS" : "FAIL") + "  " + name);
  const near = (a, b, tol) => Math.abs(a - b) <= tol * Math.abs(b);
  const fr = SF.fodder.compare({
    itemLevel: 160, fodderLevel: 150, goalStar: 22,
    baseOpts: { mvp: "none", event: "none", starCatching: true },
  });
  check("fodder: rawCheap ~16.85B", near(fr.rawCheap.total, 16.85e9, 0.001));
  check("fodder: rawZero ~52.14B", near(fr.rawZero.total, 52.14e9, 0.001));
  check("fodder: sweep is 16..23★", fr.strategies.length === 8 && fr.strategies[7].transferAt === 23);
  const t21 = fr.strategies.find((s) => s.transferAt === 21);
  const t22 = fr.strategies.find((s) => s.transferAt === 22);
  check("fodder: best transfer is 21★", fr.best.transferAt === 21);
  check("fodder: transfer@21 ~21.43B", near(t21.total, 21.43e9, 0.001));
  check("fodder: transfer@22 ~24.57B", near(t22.total, 24.57e9, 0.001));
  check("fodder: overshoot row needs no taps", fr.strategies[7].finishMesos === 0);
  const fr2 = SF.fodder.compare({
    itemLevel: 160, fodderLevel: 150, goalStar: 22,
    fodderPrice: 100e6, sparePrice: 2e9,
    baseOpts: { mvp: "none", event: "none", starCatching: true },
  });
  const t21p = fr2.strategies.find((s) => s.transferAt === 21);
  check("fodder: copy price folds into totals", near(t21p.total, t21.total + 100e6 * t21.copies, 1e-9));
  check("fodder: spare price folds into raw", near(fr2.rawCheap.total, fr.rawCheap.total + fr.rawCheap.spares * 2e9, 1e-9));
  check("fodder: level gap >10 flagged", SF.fodder.compare({
    itemLevel: 200, fodderLevel: 150, goalStar: 22,
    baseOpts: { mvp: "none", event: "none", starCatching: true },
  }).levelGapOk === false);
  // Safeguarding the fodder at 15–17★: pricier climb, fewer fodder booms —
  // strictly fewer copies and strictly more fodder mesos on every row that
  // taps 15–17★.
  const frSg = SF.fodder.compare({
    itemLevel: 160, fodderLevel: 150, goalStar: 22, fodderSafeguard: true,
    baseOpts: { mvp: "none", event: "none", starCatching: true },
  });
  const t21sg = frSg.strategies.find((s) => s.transferAt === 21);
  check("fodder: SG fodder uses fewer copies", t21sg.copies < t21.copies);
  check("fodder: SG fodder climb costs more", t21sg.fodderMesos > t21.fodderMesos);
  // Exactly 1 copy up to a float epsilon — star catching renormalizes
  // maintain/boom and leaves b ≈ 1e-17 instead of a clean 0.
  check("fodder: SG fodder can't boom below 18★",
    Math.abs(frSg.strategies.find((s) => s.transferAt === 18).copies - 1) < 1e-9);
  // Boom-reduction events + MVP make the 23★ overshoot ~tie 21★ on price
  // (within ~1%); the pick must break toward fewer copies, not the raw min.
  const frTie = SF.fodder.compare({
    itemLevel: 150, fodderLevel: 140, goalStar: 22,
    baseOpts: { mvp: "diamond", event: "shiningStarForce", starCatching: true },
  });
  check("fodder: near-tie breaks toward fewer copies (21★, not 23★)", frTie.best.transferAt === 21);

  // Issue #4: boom-count buckets must stay integer-exact for low counts even
  // when the span exceeds the bucket cap. The old continuous fallback merged
  // 0 and 1 booms into one bar labelled "0" once max booms passed 30.
  const wide = [];
  for (let v = 0; v <= 50; v++) wide.push(v, v); // span 51 > 30, two of each
  const ib = SF.bucketizeIntegers(wide, 30);
  check("hist: bucket count capped", ib.length === 30);
  check("hist: 0-boom bar stays exact", ib[0].from === 0 && ib[0].to === 0 && ib[0].count === 2);
  check("hist: singles cover 0..28", ib[28].from === 28 && ib[28].to === 28 && ib[28].count === 2);
  check("hist: tail collapses into 29–50", ib[29].from === 29 && ib[29].to === 50 && ib[29].count === 44);
  const narrow = SF.bucketizeIntegers([0, 1, 1, 3], 30);
  check("hist: narrow span keeps one bar per integer", narrow.length === 4 && narrow[1].count === 2 && narrow[2].count === 0);
</script>
</body></html>
